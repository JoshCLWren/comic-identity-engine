services:
  # CI service for running tests and linting
  ci:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    command: ["bash", "scripts/ci.sh"]

  # Application database
  postgres-app:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: comic_identity
      POSTGRES_USER: comic_user
      POSTGRES_PASSWORD: comic_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comic_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      redis-server
      --databases 2  # DB 0 for arq queue, DB 1 for app cache

volumes:
  postgres_app_data:
  redis_data:
