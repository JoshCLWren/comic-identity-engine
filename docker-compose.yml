services:
  # API service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://comic_user:comic_pass@postgres-app:5432/comic_identity
      - REDIS_URL=redis://redis:6379/0
      - ARQ_QUEUE_NAME=cie:docker:queue
    depends_on:
      postgres-app:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "uvicorn", "comic_identity_engine.api.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]

  # Worker service
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://comic_user:comic_pass@postgres-app:5432/comic_identity
      - REDIS_URL=redis://redis:6379/0
      - ARQ_QUEUE_NAME=cie:docker:queue
    depends_on:
      postgres-app:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "python", "-m", "comic_identity_engine.jobs.worker"]

  # CI service for running tests and linting
  ci:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    command: ["bash", "scripts/ci.sh"]

  # Application database
  postgres-app:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: comic_identity
      POSTGRES_USER: comic_user
      POSTGRES_PASSWORD: comic_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comic_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # DB 0 for arq queue, DB 1 for app cache
    command: redis-server --databases 2

volumes:
  postgres_app_data:
  redis_data:
